}

// ── Team View ────────────────────────────────────────────────
function TeamView({ tickets, stats }) {
  const teamData = useMemo(() => {
    const map = {};
    tickets.forEach(t => {
      const name = t.assignee;
      if (!map[name]) {
        map[name] = { name, open: 0, reopened: 0, stagnant: 0, waiting: 0, totalComments: 0, byProject: {} };
      }
      map[name].open++;
      if (t.isReopened) map[name].reopened++;
      if (t.isStagnant) map[name].stagnant++;
      if (t.waitingForResponse) map[name].waiting++;
      map[name].totalComments += t.commentCount || 0;
      map[name].byProject[t.projectKey] = (map[name].byProject[t.projectKey] || 0) + 1;
    });
    return Object.values(map).sort((a, b) => b.open - a.open);
  }, [tickets]);

  const maxOpen = Math.max(...teamData.map(t => t.open), 1);

  return (
    <div>
      <div className="section-header">Team Workload <span className="count">({teamData.length} members)</span></div>
      
      {/* Workload bar chart */}
      <div className="chart-card" style={{marginBottom: 20}}>
        <div className="chart-card-title">Tickets by Assignee</div>
        <div className="bar-chart">
          {teamData.map(m => (
            <div key={m.name} className="bar-row">
              <div className="bar-label" style={{minWidth: 100}}>{m.name}</div>
              <div className="bar-track">
                <div className="bar-fill" style={{
                  width: `${(m.open / maxOpen) * 100}%`,
                  background: m.name === 'Unassigned' ? 'var(--accent-orange)' : 'var(--accent-blue)',
                }}>
                  {m.open}
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Team cards */}
      <div className="team-grid">
        {teamData.filter(m => m.name !== 'Unassigned').map(m => (
          <div key={m.name} className="team-card">
            <div className="team-card-name">{m.name}</div>
            <div className="team-card-stats">
              <div className="team-card-stat">
                <div className="team-card-stat-label">Open</div>
                <div className="team-card-stat-value" style={{color: 'var(--accent-blue)'}}>{m.open}</div>
              </div>
              <div className="team-card-stat">
                <div className="team-card-stat-label">Reopened</div>
                <div className="team-card-stat-value" style={{color: m.reopened > 0 ? 'var(--accent-red)' : 'var(--text-muted)'}}>{m.reopened}</div>
              </div>
              <div className="team-card-stat">
                <div className="team-card-stat-label">Stagnant</div>
                <div className="team-card-stat-value" style={{color: m.stagnant > 0 ? 'var(--accent-orange)' : 'var(--text-muted)'}}>{m.stagnant}</div>
              </div>
              <div className="team-card-stat">
                <div className="team-card-stat-label">Waiting</div>
                <div className="team-card-stat-value" style={{color: 'var(--accent-purple)'}}>{m.waiting}</div>
              </div>
            </div>
            <div style={{marginTop: 10, fontSize: 11, color: 'var(--text-muted)'}}>
              {Object.entries(m.byProject).map(([proj, count]) => (
                <span key={proj} style={{marginRight: 8, fontFamily: 'var(--font-mono)'}}>
                  {proj}: {count}
                </span>
              ))}
            </div>
          </div>
        ))}
      </div>

      {/* Concentration metrics */}
      <div className="chart-card">
        <div className="chart-card-title">Workload Concentration</div>
        {(() => {
          const assigned = teamData.filter(m => m.name !== 'Unassigned');
          const total = assigned.reduce((s, m) => s + m.open, 0);
          if (total === 0) return <p style={{color: 'var(--text-muted)'}}>No assigned tickets.</p>;
          const top1 = assigned[0] ? Math.round(assigned[0].open / total * 100) : 0;
          const top2 = assigned.slice(0, 2).reduce((s, m) => s + m.open, 0);
          const top3 = assigned.slice(0, 3).reduce((s, m) => s + m.open, 0);
          return (
            <div style={{display: 'flex', gap: 32}}>
              <div>
                <div style={{fontSize: 11, color: 'var(--text-muted)', textTransform: 'uppercase'}}>Top 1 Assignee</div>
                <div style={{fontFamily: 'var(--font-mono)', fontSize: 24, fontWeight: 700}}>{top1}%</div>
                <div style={{fontSize: 12, color: 'var(--text-secondary)'}}>{assigned[0]?.name}</div>
              </div>
              <div>
                <div style={{fontSize: 11, color: 'var(--text-muted)', textTransform: 'uppercase'}}>Top 2 Assignees</div>
                <div style={{fontFamily: 'var(--font-mono)', fontSize: 24, fontWeight: 700}}>{Math.round(top2 / total * 100)}%</div>
              </div>
              <div>
                <div style={{fontSize: 11, color: 'var(--text-muted)', textTransform: 'uppercase'}}>Top 3 Assignees</div>
                <div style={{fontFamily: 'var(--font-mono)', fontSize: 24, fontWeight: 700}}>{Math.round(top3 / total * 100)}%</div>
              </div>
            </div>
          );
        })()}
      </div>
    </div>
  );
}

// ── Analytics View ───────────────────────────────────────────
function AnalyticsView({ tickets, stats }) {
  // Project breakdown
  const projectData = useMemo(() => {
    const counts = {};
    tickets.forEach(t => {
      counts[t.projectKey] = (counts[t.projectKey] || 0) + 1;
    });
    return Object.entries(counts).sort((a, b) => b[1] - a[1]);
  }, [tickets]);

  const maxProject = Math.max(...projectData.map(([, c]) => c), 1);

  // Issue type breakdown
  const typeData = useMemo(() => {
    const counts = {};
    tickets.forEach(t => {
      counts[t.issueType] = (counts[t.issueType] || 0) + 1;
    });
    return Object.entries(counts).sort((a, b) => b[1] - a[1]);
  }, [tickets]);

  const maxType = Math.max(...typeData.map(([, c]) => c), 1);

  // Priority breakdown
  const priorityData = useMemo(() => {
    const counts = {};
    tickets.forEach(t => {
      counts[t.priority] = (counts[t.priority] || 0) + 1;
    });
    const order = ['Highest', 'High', 'Medium', 'Low', 'Lowest'];
    return order.filter(p => counts[p]).map(p => [p, counts[p]]);
  }, [tickets]);

  const maxPriority = Math.max(...priorityData.map(([, c]) => c), 1);

  // Status breakdown
  const statusData = useMemo(() => {
    const counts = {};
    tickets.forEach(t => {
      counts[t.status] = (counts[t.status] || 0) + 1;
    });
    return Object.entries(counts).sort((a, b) => b[1] - a[1]);
  }, [tickets]);

  const maxStatus = Math.max(...statusData.map(([, c]) => c), 1);

  // Day of week distribution (from created date)
  const dayOfWeekData = useMemo(() => {
    const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    const counts = Array(7).fill(0);
    tickets.forEach(t => {
      if (t.created) {
        const d = new Date(t.created);
        counts[d.getDay()]++;
      }
    });
    return days.map((day, i) => [day, counts[i]]);
  }, [tickets]);

  const maxDay = Math.max(...dayOfWeekData.map(([, c]) => c), 1);

  // Hour of day distribution
  const hourData = useMemo(() => {
    const counts = Array(24).fill(0);
    tickets.forEach(t => {
      if (t.created) {
        // Convert to Central time
        const d = new Date(t.created);
        const ctHour = parseInt(d.toLocaleString('en-US', { timeZone: 'America/Chicago', hour: 'numeric', hour12: false }));
        counts[ctHour]++;
      }
    });
    return counts;
  }, [tickets]);

  const maxHour = Math.max(...hourData, 1);

  // Colors for projects
  const projectColors = {
    PSS: 'var(--accent-blue)',
    MCQM: 'var(--accent-green)',
    FHPS: 'var(--accent-purple)',
    OAC: 'var(--accent-orange)',
  };

  const priorityColors = {
    Highest: 'var(--priority-highest)',
    High: 'var(--priority-high)',
    Medium: 'var(--priority-medium)',
    Low: 'var(--priority-low)',
    Lowest: 'var(--priority-lowest)',
  };

  return (
    <div>
      <div className="section-header">Open Queue Analytics</div>

      <div className="chart-grid">
        {/* Volume by Project */}
        <div className="chart-card">
          <div className="chart-card-title">Volume by Project</div>
          <div className="bar-chart">
            {projectData.map(([proj, count]) => (
              <div key={proj} className="bar-row">
                <div className="bar-label">{proj}</div>
                <div className="bar-track">
                  <div className="bar-fill" style={{
                    width: `${(count / maxProject) * 100}%`,
                    background: projectColors[proj] || 'var(--accent-blue)',
                  }}>
                    {count}
                  </div>
                </div>
              </div>
            ))}
          </div>
          <div style={{marginTop: 8, fontSize: 11, color: 'var(--text-muted)'}}>
            MCQM = Patient Support Services
          </div>
        </div>

        {/* Volume by Issue Type */}
        <div className="chart-card">
          <div className="chart-card-title">Volume by Issue Type</div>
          <div className="bar-chart">
            {typeData.map(([type, count]) => (
              <div key={type} className="bar-row">
                <div className="bar-label" style={{minWidth: 100}}>{type}</div>
                <div className="bar-track">
                  <div className="bar-fill" style={{
                    width: `${(count / maxType) * 100}%`,
                    background: 'var(--accent-cyan)',
                  }}>
                    {count}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Volume by Priority */}
        <div className="chart-card">
          <div className="chart-card-title">Volume by Priority</div>
          <div className="bar-chart">
            {priorityData.map(([priority, count]) => (
              <div key={priority} className="bar-row">
                <div className="bar-label">{priority}</div>
                <div className="bar-track">
                  <div className="bar-fill" style={{
                    width: `${(count / maxPriority) * 100}%`,
                    background: priorityColors[priority] || 'var(--accent-blue)',
                  }}>
                    {count}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Volume by Status */}
        <div className="chart-card">
          <div className="chart-card-title">Volume by Status</div>
          <div className="bar-chart">
            {statusData.map(([status, count]) => (
              <div key={status} className="bar-row">
                <div className="bar-label" style={{minWidth: 120}}>{status}</div>
                <div className="bar-track">
                  <div className="bar-fill" style={{
                    width: `${(count / maxStatus) * 100}%`,
                    background: status.toLowerCase().includes('reopen') ? 'var(--accent-red)' :
                      status.toLowerCase().includes('progress') ? 'var(--accent-orange)' :
                      status.toLowerCase().includes('wait') ? 'var(--accent-purple)' :
                      'var(--accent-blue)',
                  }}>
                    {count}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Hour of Day Chart */}
      <div className="chart-card" style={{marginBottom: 20}}>
        <div className="chart-card-title">Created by Hour of Day (Central Time)</div>
        <div style={{display: 'flex', alignItems: 'flex-end', gap: 2, height: 120}}>
          {hourData.map((count, hour) => {
            const h = hour % 12 || 12;
            const ampm = hour < 12 ? 'A' : 'P';
            const isBusinessHours = hour >= 8 && hour < 20;
            return (
              <div key={hour} style={{flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2}}>
                <div style={{
                  width: '100%',
                  height: `${(count / maxHour) * 100}px`,
                  background: isBusinessHours ? 'var(--accent-blue)' : 'var(--border)',
                  borderRadius: '2px 2px 0 0',
                  minHeight: count > 0 ? 4 : 0,
                  position: 'relative',
                }}>
                  {count > 0 && (
                    <div style={{
                      position: 'absolute', top: -16, width: '100%', textAlign: 'center',
                      fontSize: 9, fontFamily: 'var(--font-mono)', color: 'var(--text-muted)',
                    }}>
                      {count}
                    </div>
                  )}
                </div>
                {hour % 3 === 0 && (
                  <div style={{fontSize: 9, fontFamily: 'var(--font-mono)', color: 'var(--text-muted)'}}>
                    {h}{ampm}
                  </div>
                )}
              </div>
            );
          })}
        </div>
        <div style={{marginTop: 8, fontSize: 11, color: 'var(--text-muted)'}}>
          Blue = business hours (8 AM - 8 PM CT) | Gray = after hours
        </div>
      </div>

      {/* Day of Week */}
      <div className="chart-card">
        <div className="chart-card-title">Created by Day of Week</div>
        <div className="bar-chart">
          {dayOfWeekData.map(([day, count]) => (
            <div key={day} className="bar-row">
              <div className="bar-label">{day}</div>
              <div className="bar-track">
                <div className="bar-fill" style={{
                  width: `${(count / maxDay) * 100}%`,
                  background: ['Sat', 'Sun'].includes(day) ? 'var(--border-light)' : 'var(--accent-blue)',
                }}>
                  {count}
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── Recap View ───────────────────────────────────────────────
function RecapView({ tickets, stats }) {
  const [copied, setCopied] = useState(false);

  const recap = useMemo(() => {
    const now = new Date();
    const dateStr = now.toLocaleDateString('en-US', {
      timeZone: 'America/Chicago',
      month: '2-digit', day: '2-digit', year: 'numeric',
    });

    const byProject = {};
    const byAssignee = {};
    const reopened = [];
    const stagnant = [];

    tickets.forEach(t => {
      byProject[t.projectKey] = (byProject[t.projectKey] || 0) + 1;
      byAssignee[t.assignee] = (byAssignee[t.assignee] || 0) + 1;
      if (t.isReopened) reopened.push(t);
      if (t.isStagnant) stagnant.push(t);
    });

    const whoopCount = tickets.filter(t => t.isWhoop).length;

    const lines = [
      `CX Daily Recap - ${dateStr}`,
      ``,
      `OPEN BACKLOG: ${tickets.length}`,
      `REOPENED: ${reopened.length}`,
      `STAGNANT (24h+): ${stagnant.length}`,
      ``,
      `BY PROJECT:`,
      ...Object.entries(byProject).sort((a, b) => b[1] - a[1]).map(([proj, count]) => {
        let extra = '';
        if (proj === 'PSS') extra = ` (Whoop: ${whoopCount})`;
        const label = PROJECT_LABELS[proj] || proj;
        return `  ${proj} (${label}): ${count}${extra}`;
      }),
      ``,
      `TEAM WORKLOAD:`,
      ...Object.entries(byAssignee).sort((a, b) => b[1] - a[1]).map(([name, count]) =>
        `  ${name}: ${count}`
      ),
    ];

    if (reopened.length > 0) {
      lines.push('', 'REOPENED TICKETS:');
      reopened.forEach(t => {
        lines.push(`  ${t.key} (${t.assignee}) - reopen x${t.reopenCount}`);
      });
    }

    if (stagnant.length > 0) {
      lines.push('', `STAGNANT TICKETS (TOP ${Math.min(10, stagnant.length)}):`);
      stagnant.slice(0, 10).forEach(t => {
        lines.push(`  ${t.key} (${t.assignee}) - ${formatAge(t.hoursSinceUpdate)} since update`);
      });
      if (stagnant.length > 10) lines.push(`  ...and ${stagnant.length - 10} more`);
    }

    return lines.join('\n');
  }, [tickets, stats]);

  const slackRecap = useMemo(() => {
    const now = new Date();
    const dateStr = now.toLocaleDateString('en-US', {
      timeZone: 'America/Chicago',
      month: '2-digit', day: '2-digit', year: 'numeric',
    });

    const byProject = {};
    const byAssignee = {};
    const reopened = tickets.filter(t => t.isReopened);
    const stagnant = tickets.filter(t => t.isStagnant);
    const whoopCount = tickets.filter(t => t.isWhoop).length;

    tickets.forEach(t => {
      byProject[t.projectKey] = (byProject[t.projectKey] || 0) + 1;
      byAssignee[t.assignee] = (byAssignee[t.assignee] || 0) + 1;
    });

    const lines = [
      `:bar_chart: *CX Daily Recap - ${dateStr}*`,
      ``,
      `:open_file_folder: Open Backlog: *${tickets.length}*`,
      reopened.length > 0 ? `:rotating_light: Reopened: *${reopened.length}*` : ':large_green_circle: No reopened tickets',
      stagnant.length > 0 ? `:warning: Stagnant (24h+): *${stagnant.length}*` : ':large_green_circle: No stagnant tickets',
      ``,
      `*Open by Project*`,
      ...Object.entries(byProject).sort((a, b) => b[1] - a[1]).map(([proj, count]) => {
        let extra = '';
        if (proj === 'PSS') extra = ` (Whoop: ${whoopCount})`;
        return `  ${proj}: *${count}*${extra}`;
      }),
      ``,
      `*Team Workload*`,
      ...Object.entries(byAssignee).sort((a, b) => b[1] - a[1]).slice(0, 6).map(([name, count]) =>
        `  ${name}: ${count}`
      ),
    ];

    if (reopened.length > 0) {
      lines.push('', '*Reopened:*');
      reopened.slice(0, 5).forEach(t => {
        lines.push(`  ${t.key} (${t.assignee})`);
      });
    }

    return lines.join('\n');
  }, [tickets]);

  const handleCopy = async (text) => {
    try {
      await navigator.clipboard.writeText(text);
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    } catch {
      // Fallback
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    }
  };

  return (
    <div>
      <div className="section-header">Daily Recap</div>
      <p style={{color: 'var(--text-secondary)', fontSize: 13, marginBottom: 16}}>
        Copy and paste into Slack, or configure Zapier to hit the <code style={{
          fontFamily: 'var(--font-mono)', background: '#f0f2f5', padding: '2px 6px', borderRadius: 3
        }}>/api/daily-recap</code> endpoint at 4:00 PM CT.
      </p>

      <div style={{marginBottom: 12}}>
        <div style={{display: 'flex', gap: 8, marginBottom: 8}}>
          <button className={`copy-btn ${copied ? 'copied' : ''}`} onClick={() => handleCopy(slackRecap)}>
            {copied ? 'Copied!' : 'Copy Slack Version'}
          </button>
          <button className="copy-btn" style={{background: '#f5f7fa', color: 'var(--text-primary)', border: '1px solid var(--border)'}}
            onClick={() => handleCopy(recap)}>
            Copy Plain Text
          </button>
        </div>
      </div>

      <div className="section-header" style={{fontSize: 13}}>Slack Format Preview</div>
      <div className="recap-box" style={{marginBottom: 20}}>{slackRecap}</div>

      <div className="section-header" style={{fontSize: 13}}>Plain Text Format</div>
      <div className="recap-box">{recap}</div>
    </div>
  );
}

// ── History View ────────────────────────────────────────────
function HistoryView() {
  const [historyData, setHistoryData] = useState(null);
  const [historyMeta, setHistoryMeta] = useState(null);
  const [histLoading, setHistLoading] = useState(false);
  const [histError, setHistError] = useState(null);

  // Date range
  const today = new Date().toISOString().split('T')[0];
  const [histFrom, setHistFrom] = useState(() => {
    const d = new Date(); d.setDate(d.getDate() - 30); return d.toISOString().split('T')[0];
  });
  const [histTo, setHistTo] = useState(today);
  const [histPreset, setHistPreset] = useState('30d');

  // Filters
  const [histSearch, setHistSearch] = useState('');
  const [histStatus, setHistStatus] = useState('all');
  const [histProject, setHistProject] = useState('all');
  const [histSort, setHistSort] = useState('created');
  const [histSortDir, setHistSortDir] = useState('desc');

  const applyPreset = (preset) => {
    setHistPreset(preset);
    const d = new Date();
    let from;
    switch (preset) {
      case '7d': from = new Date(d); from.setDate(from.getDate() - 7); break;
      case '30d': from = new Date(d); from.setDate(from.getDate() - 30); break;
      case '90d': from = new Date(d); from.setDate(from.getDate() - 90); break;
      case '6mo': from = new Date(d); from.setMonth(from.getMonth() - 6); break;
      default: return; // custom — don't change dates
    }
    setHistFrom(from.toISOString().split('T')[0]);
    setHistTo(today);
  };

  const fetchHistory = async () => {
    setHistLoading(true);
    setHistError(null);
    try {
      const res = await fetch(`/api/jira-proxy/history?from=${histFrom}&to=${histTo}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      setHistoryData(data.tickets || data);
      setHistoryMeta(data.meta || { from: histFrom, to: histTo, total: (data.tickets || data).length });
    } catch (e) {
      setHistError(e.message);
      setHistoryData(null);
    }
    setHistLoading(false);
  };

  // Client-side filtering + sorting
  const filtered = useMemo(() => {
    if (!historyData) return [];
    let rows = historyData;
    if (histStatus !== 'all') {
      if (histStatus === 'open') rows = rows.filter(t => t.statusCategory !== 'Done');
      else if (histStatus === 'resolved') rows = rows.filter(t => t.statusCategory === 'Done');
      else if (histStatus === 'reopened') rows = rows.filter(t => t.status === 'Reopened');
    }
    if (histProject !== 'all') rows = rows.filter(t => t.projectKey === histProject);
    if (histSearch.trim()) {
      const q = histSearch.toLowerCase().trim();
      rows = rows.filter(t =>
        (t.key || '').toLowerCase().includes(q) ||
        (t.summary || '').toLowerCase().includes(q) ||
        (t.assignee || '').toLowerCase().includes(q) ||
        (t.partner || '').toLowerCase().includes(q)
      );
    }
    // Sort
    rows = [...rows].sort((a, b) => {
      let cmp = 0;
      switch (histSort) {
        case 'key': cmp = (a.key || '').localeCompare(b.key || ''); break;
        case 'status': cmp = (a.status || '').localeCompare(b.status || ''); break;
        case 'priority': cmp = (parseInt(a.priorityId) || 5) - (parseInt(b.priorityId) || 5); break;
        case 'assignee': cmp = (a.assignee || '').localeCompare(b.assignee || ''); break;
        case 'partner': cmp = (a.partner || '').localeCompare(b.partner || ''); break;
        case 'created': cmp = new Date(a.created || 0) - new Date(b.created || 0); break;
        case 'resolved': cmp = new Date(a.resolved || 0) - new Date(b.resolved || 0); break;
        default: cmp = 0;
      }
      return histSortDir === 'desc' ? -cmp : cmp;
    });
    return rows;
  }, [historyData, histStatus, histProject, histSearch, histSort, histSortDir]);

  const toggleSort = (col) => {
    if (histSort === col) setHistSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setHistSort(col); setHistSortDir('desc'); }
  };
  const sortIcon = (col) => histSort === col ? (histSortDir === 'asc' ? ' ▲' : ' ▼') : '';

  const fmtDate = (d) => d ? new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '—';
  const ageDays = (d) => d ? Math.round((Date.now() - new Date(d)) / 86400000) : null;

  // Status badge colors
  const statusColor = (s) => {
    const lc = (s || '').toLowerCase();
    if (lc.includes('reopen')) return { bg: '#fef2f2', color: '#991b1b', border: '#fecaca' };
    if (lc.includes('waiting') || lc.includes('pending')) return { bg: '#fffbeb', color: '#92400e', border: '#fde68a' };
    if (lc === 'done' || lc === 'resolved' || lc === 'closed') return { bg: '#f0fdf4', color: '#166534', border: '#bbf7d0' };
    if (lc.includes('progress')) return { bg: '#eff6ff', color: '#1e40af', border: '#bfdbfe' };
    return { bg: '#f8fafc', color: '#475569', border: '#e2e8f0' };
  };

  return (
    <div>
      <div className="section-card" style={{ marginBottom: 16 }}>
        <h3 style={{ margin: '0 0 12px', fontSize: 15, fontWeight: 700 }}>🔍 Historical Ticket Search</h3>
        <div style={{ fontSize: 12, color: '#64748b', marginBottom: 12 }}>Search all tickets across PSS, MCQM, FHPS, OAC — up to 6 months back, any status.</div>

        {/* Date presets + custom range */}
        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', alignItems: 'center', marginBottom: 10 }}>
          {[['7d','7 Days'],['30d','30 Days'],['90d','90 Days'],['6mo','6 Months']].map(([val, label]) => (
            <button key={val} onClick={() => applyPreset(val)}
              style={{ padding: '4px 12px', fontSize: 11, fontWeight: histPreset === val ? 700 : 400,
                border: histPreset === val ? '2px solid #0f766e' : '1px solid #e2e8f0',
                borderRadius: 4, background: histPreset === val ? '#f0fdfa' : 'white',
                color: histPreset === val ? '#0f766e' : '#64748b', cursor: 'pointer' }}>
              {label}
            </button>
          ))}
          <span style={{ color: '#cbd5e1' }}>|</span>
          <label style={{ fontSize: 11, display: 'flex', alignItems: 'center', gap: 4 }}>
            From <input type="date" value={histFrom} onChange={e => { setHistFrom(e.target.value); setHistPreset('custom'); }}
              style={{ padding: '3px 6px', fontSize: 11, border: '1px solid #e2e8f0', borderRadius: 4 }} />
          </label>
          <label style={{ fontSize: 11, display: 'flex', alignItems: 'center', gap: 4 }}>
            To <input type="date" value={histTo} onChange={e => { setHistTo(e.target.value); setHistPreset('custom'); }}
              style={{ padding: '3px 6px', fontSize: 11, border: '1px solid #e2e8f0', borderRadius: 4 }} />
          </label>
          <button onClick={fetchHistory} disabled={histLoading}
            style={{ padding: '5px 16px', fontSize: 12, fontWeight: 700, border: 'none', borderRadius: 4,
              background: '#0f766e', color: 'white', cursor: histLoading ? 'wait' : 'pointer', opacity: histLoading ? 0.6 : 1 }}>
            {histLoading ? 'Searching...' : 'Search'}
          </button>
        </div>

        {/* Filters row */}
        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', alignItems: 'center' }}>
          <input type="text" value={histSearch} onChange={e => setHistSearch(e.target.value)}
            placeholder="Search key, summary, assignee, partner..."
            style={{ padding: '4px 8px', fontSize: 11, border: '1px solid #e2e8f0', borderRadius: 4, width: 240 }} />
          <select value={histStatus} onChange={e => setHistStatus(e.target.value)}
            style={{ padding: '4px 8px', fontSize: 11, border: '1px solid #e2e8f0', borderRadius: 4 }}>
            <option value="all">All Statuses</option>
            <option value="open">Open</option>
            <option value="resolved">Resolved / Done</option>
            <option value="reopened">Reopened</option>
          </select>
          <select value={histProject} onChange={e => setHistProject(e.target.value)}
            style={{ padding: '4px 8px', fontSize: 11, border: '1px solid #e2e8f0', borderRadius: 4 }}>
            <option value="all">All Projects</option>
            <option value="PSS">PSS</option>
            <option value="MCQM">MCQM</option>
            <option value="FHPS">FHPS</option>
            <option value="OAC">OAC</option>
          </select>
        </div>
      </div>

      {histError && <div style={{ padding: 12, background: '#fef2f2', border: '1px solid #fecaca', borderRadius: 6, color: '#991b1b', fontSize: 12, marginBottom: 12 }}>{histError}</div>}

      {histLoading && (
        <div style={{ textAlign: 'center', padding: 40 }}>
          <div className="spinner" style={{ margin: '0 auto 12px' }}></div>
          <div style={{ fontSize: 13, color: '#64748b' }}>Searching Jira for tickets from {histFrom} to {histTo}...</div>
        </div>
      )}

      {!histLoading && historyData && (
        <div>
          <div style={{ fontSize: 12, color: '#64748b', marginBottom: 8 }}>
            <strong>{filtered.length.toLocaleString()}</strong> tickets shown
            {historyMeta && <span> ({historyMeta.total.toLocaleString()} total from {fmtDate(historyMeta.from)} – {fmtDate(historyMeta.to)})</span>}
            {histSearch && <span> — filtered by "{histSearch}"</span>}
          </div>

          <div className="table-container" style={{ maxHeight: 'calc(100vh - 320px)', overflowY: 'auto' }}>
            <table className="data-table" style={{ width: '100%', fontSize: 12 }}>
              <thead style={{ position: 'sticky', top: 0, background: '#f8fafc', zIndex: 2 }}>
                <tr>
                  <th style={{ cursor: 'pointer', whiteSpace: 'nowrap' }} onClick={() => toggleSort('priority')}>P{sortIcon('priority')}</th>
                  <th style={{ cursor: 'pointer', whiteSpace: 'nowrap' }} onClick={() => toggleSort('key')}>Key{sortIcon('key')}</th>
                  <th>Summary</th>
                  <th style={{ cursor: 'pointer', whiteSpace: 'nowrap' }} onClick={() => toggleSort('status')}>Status{sortIcon('status')}</th>
                  <th style={{ cursor: 'pointer', whiteSpace: 'nowrap' }} onClick={() => toggleSort('partner')}>Partner{sortIcon('partner')}</th>
                  <th style={{ cursor: 'pointer', whiteSpace: 'nowrap' }} onClick={() => toggleSort('assignee')}>Assignee{sortIcon('assignee')}</th>
                  <th style={{ cursor: 'pointer', whiteSpace: 'nowrap' }} onClick={() => toggleSort('created')}>Created{sortIcon('created')}</th>
                  <th style={{ cursor: 'pointer', whiteSpace: 'nowrap' }} onClick={() => toggleSort('resolved')}>Resolved{sortIcon('resolved')}</th>
                  <th style={{ whiteSpace: 'nowrap' }}>Age</th>
                </tr>
              </thead>
              <tbody>
                {filtered.slice(0, 2000).map(t => {
                  const sc = statusColor(t.status);
                  const age = ageDays(t.created);
                  return (
                    <tr key={t.key} style={{ borderBottom: '1px solid #f1f5f9' }}>
                      <td style={{ textAlign: 'center', fontWeight: 600, color: t.priorityId <= 2 ? '#dc2626' : t.priorityId <= 3 ? '#d97706' : '#64748b' }}>
                        {t.priority === 'Highest' ? '⬆' : t.priority === 'High' ? '↑' : t.priority === 'Low' ? '↓' : t.priority === 'Lowest' ? '⬇' : '•'}
                      </td>
                      <td style={{ whiteSpace: 'nowrap' }}>
                        <a href={t.jiraUrl || `https://steadymd.atlassian.net/browse/${t.key}`} target="_blank" rel="noopener"
                          style={{ color: '#0f766e', fontWeight: 600, textDecoration: 'none', fontFamily: 'monospace' }}>{t.key}</a>
                      </td>
                      <td style={{ maxWidth: 320, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }} title={t.summary}>{t.summary}</td>
                      <td>
                        <span style={{ padding: '2px 8px', borderRadius: 10, fontSize: 10, fontWeight: 600,
                          background: sc.bg, color: sc.color, border: `1px solid ${sc.border}`, whiteSpace: 'nowrap' }}>
                          {t.status}
                        </span>
                      </td>
                      <td style={{ fontSize: 11, whiteSpace: 'nowrap' }}>
                        {t.partner || <span style={{ color: '#cbd5e1' }}>—</span>}
                      </td>
                      <td style={{ fontSize: 11, whiteSpace: 'nowrap', color: t.assignee === 'Unassigned' ? '#d97706' : undefined }}>
                        {t.assignee}
                      </td>
                      <td style={{ fontSize: 11, whiteSpace: 'nowrap' }}>{fmtDate(t.created)}</td>
                      <td style={{ fontSize: 11, whiteSpace: 'nowrap' }}>{fmtDate(t.resolved)}</td>
                      <td style={{ fontSize: 11, whiteSpace: 'nowrap', textAlign: 'right', color: age > 30 ? '#dc2626' : age > 7 ? '#d97706' : '#64748b' }}>
                        {age !== null ? `${age}d` : '—'}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
            {filtered.length > 2000 && <div style={{ padding: 8, fontSize: 11, color: '#64748b', textAlign: 'center' }}>Showing first 2,000 of {filtered.length.toLocaleString()} — use filters to narrow down.</div>}
          </div>
        </div>
      )}

      {!histLoading && !historyData && !histError && (
        <div style={{ textAlign: 'center', padding: 40, color: '#94a3b8' }}>
          <div style={{ fontSize: 28, marginBottom: 8 }}>🔍</div>
          <div style={{ fontSize: 14, fontWeight: 600 }}>Select a date range and click Search</div>
          <div style={{ fontSize: 12, marginTop: 4 }}>Queries Jira live — results include all statuses (open, resolved, reopened, etc.)</div>
        </div>
      )}
    </div>
  );
}

// ── Definitions View ─────────────────────────────────────────
function DefinitionsView() {
  return (
    <div>
      <div className="section-header">📖 Definitions & Measurement Guide</div>
      <p style={{color: 'var(--text-secondary)', fontSize: 13, marginBottom: 20, lineHeight: 1.7}}>
        This page explains every metric, flag, badge, and threshold used across the CX Workbench.
        Hover over any stat card or column header on other tabs for a quick summary.
      </p>

      {/* ── SLA Section ── */}
      <div className="section-header" style={{fontSize: 15}}>⏱ SLA (Service Level Agreement)</div>
      <div className="def-grid">
        <div className="def-card">
          <div className="def-card-title">⏱ First External Reply Time</div>
          <p>
            Measured from ticket creation to the first <strong>non-internal</strong> comment
            (i.e., a comment visible to the partner/customer). Internal notes don't count.
          </p>
          <ul>
            <li><strong>All partners:</strong> first reply must be within <code>4 hours</code></li>
            <li><strong>FHPS only:</strong> first reply must be within <code>120 minutes (2 hours)</code></li>
          </ul>
        </div>
        <div className="def-card">
          <div className="def-card-title">🚨 SLA Breach</div>
          <p>
            A ticket is in <strong>SLA breach</strong> when the first external reply took longer
            than the threshold — or when no external reply has been sent yet and the ticket is
            older than the threshold.
          </p>
          <ul>
            <li>Breached tickets show a red <span className="tag-sla-breach">SLA BREACH</span> badge</li>
            <li>Tickets still awaiting reply show <span style={{fontSize: 10, color: 'var(--accent-orange)'}}>⏳ awaiting</span></li>
            <li>Compliant tickets show a green <span className="tag-sla-ok">✓ Xh</span> badge with the reply time</li>
          </ul>
        </div>
        <div className="def-card">
          <div className="def-card-title">💰 FHPS Penalty ($200)</div>
          <p>
            Each FHPS ticket where the first external reply exceeds 120 minutes incurs a
            <strong> $200 contractual penalty</strong>. The total penalty amount is shown in the
            Alerts tab and in the stat card.
          </p>
          <p style={{marginTop: 6}}>
            <span className="tag-penalty">$200</span> badge appears on affected tickets.
          </p>
        </div>
        <div className="def-card">
          <div className="def-card-title">📊 SLA Column (Queue Table)</div>
          <p>
            The SLA column shows one of three states:
          </p>
          <ul>
            <li><span className="tag-sla-breach">BREACH 5h</span> — replied at 5h, threshold was 4h</li>
            <li><span className="tag-sla-breach">BREACH NO REPLY</span> — no external reply sent, past threshold</li>
            <li><span className="tag-sla-ok">1.2h</span> — replied within threshold</li>
            <li><span style={{fontSize: 10, color: 'var(--accent-orange)'}}>⏳ awaiting</span> — no reply yet, still within threshold</li>
          </ul>
        </div>
      </div>

      <div className="section-divider" />

      {/* ── Reopen Section ── */}
      <div className="section-header" style={{fontSize: 15}}>🔄 Reopen Tracking</div>
      <div className="def-grid">
        <div className="def-card">
          <div className="def-card-title">🔴 True Reopen</div>
          <p>
            A ticket is only counted as "reopened" when it transitions <strong>FROM</strong> a
            final/resolved status <strong>TO</strong> a non-final status. This prevents false
            positives from normal workflow movements.
          </p>
          <p style={{marginTop: 6}}><strong>Final statuses recognized:</strong></p>
          <ul>
            <li><code>Done</code>, <code>Closed</code>, <code>Resolved</code></li>
            <li><code>Cancelled</code>, <code>Declined</code>, <code>Won't Do</code></li>
          </ul>
          <p style={{marginTop: 6}}>
            Example: "In Progress → Done → Reopened" counts as 1 reopen.
            "Open → In Progress" does <em>not</em> count.
          </p>
        </div>
        <div className="def-card">
          <div className="def-card-title">🔥 Chronic Reopen</div>
          <p>
            A ticket is flagged as <strong>chronic</strong> when it has been reopened
            <strong> 4 or more times within the last 72 hours</strong>. This signals a
            systemic issue — the root cause isn't being addressed.
          </p>
          <ul>
            <li>Triggers a pulsing red banner on both the Queue and Alerts tabs</li>
            <li>Shows <span className="tag-chronic">🔥 CHRONIC x4</span> badge</li>
            <li>Requires immediate lead intervention</li>
          </ul>
        </div>
        <div className="def-card">
          <div className="def-card-title">📈 Reopen Count vs. 72h Count</div>
          <p>
            <strong>Reopen Count (total)</strong> = lifetime count of all reopen transitions
            on this ticket, regardless of when they happened.
          </p>
          <p style={{marginTop: 6}}>
            <strong>Reopens in 72h</strong> = only reopens that occurred in the last 3 days.
            This windowed count drives the chronic reopen alert.
          </p>
        </div>
      </div>

      <div className="section-divider" />

      {/* ── Comment Volume ── */}
      <div className="section-header" style={{fontSize: 15}}>💬 Comment Volume</div>
      <div className="def-grid">
        <div className="def-card">
          <div className="def-card-title">💬 High Comment Volume (6+)</div>
          <p>
            Tickets with <strong>more than 6 comments</strong> are flagged as high-volume.
            This often indicates back-and-forth that hasn't resolved the issue, or
            escalation/complexity.
          </p>
          <ul>
            <li>Comment count turns <strong style={{color: 'var(--accent-orange)'}}>orange and bold</strong> in the Cmts column</li>
            <li>Shows <span className="tag-high-comments">💬 8</span> badge in the Flags column</li>
            <li>Dedicated section in the Alerts tab breaks down internal vs. external comments</li>
          </ul>
        </div>
        <div className="def-card">
          <div className="def-card-title">🔍 Internal vs. External Comments</div>
          <p>
            <strong>Internal:</strong> Comments marked as internal notes or with role-based
            visibility in Jira Service Desk (<code>jsdPublic = false</code>). Not visible to the customer.
          </p>
          <p style={{marginTop: 6}}>
            <strong>External:</strong> Public comments visible to the partner/customer.
            The first external comment is what defines the SLA first-reply time.
          </p>
        </div>
      </div>

      <div className="section-divider" />

      {/* ── Other Metrics ── */}
      <div className="section-header" style={{fontSize: 15}}>📏 Other Metrics</div>
      <div className="def-grid">
        <div className="def-card">
          <div className="def-card-title">⏰ Stagnant (24h+)</div>
          <p>
            A ticket is <strong>stagnant</strong> when its <code>updated</code> timestamp
            in Jira is more than 24 hours old. Any status change, comment, or field edit
            resets this timer.
          </p>
        </div>
        <div className="def-card">
          <div className="def-card-title">⏳ Waiting for Response</div>
          <p>
            The most recent comment on this ticket was from our <strong>internal team</strong>.
            We're waiting on the partner/customer to reply. The ball is in their court.
          </p>
        </div>
        <div className="def-card">
          <div className="def-card-title">📅 Total Age vs. Last Update</div>
          <p>
            <strong>Total Age:</strong> Time since the ticket was <em>created</em> in Jira.
            Shows how long this issue has existed.
          </p>
          <p style={{marginTop: 6}}>
            <strong>Last Update:</strong> Time since the ticket was last <em>modified</em>
            (any field change, comment, or transition). Shows how long since anyone touched it.
          </p>
        </div>
        <div className="def-card">
          <div className="def-card-title">🏷 Projects</div>
          <p>Four Jira projects are tracked:</p>
          <ul>
            <li><code>PSS</code> — Partner Support Services</li>
            <li><code>MCQM</code> — Patient Support Services</li>
            <li><code>FHPS</code> — FHPS (120min SLA, $200 penalty)</li>
            <li><code>OAC</code> — OAC</li>
          </ul>
        </div>
      </div>

      <div className="section-divider" />

      {/* ── Badge/Flag Legend ── */}
      <div className="section-header" style={{fontSize: 15}}>🏷 Badge & Flag Legend</div>
      <div className="def-card" style={{marginBottom: 24}}>
        <table className="legend-table">
          <thead>
            <tr>
              <th>Badge</th>
              <th>Name</th>
              <th>What It Means</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><span className="tag-whoop">WHOOP</span></td>
              <td>Whoop Partner</td>
              <td>PSS ticket tagged with Whoop label, component, or summary text.</td>
            </tr>
            <tr>
              <td><span className="tag-reopen">REOPEN x3</span></td>
              <td>Reopened</td>
              <td>Ticket has been reopened X times total (transitions from final → open status).</td>
            </tr>
            <tr>
              <td><span className="tag-chronic">🔥 CHRONIC x4</span></td>
              <td>Chronic Reopen</td>
              <td>Reopened 4+ times within the last 72 hours. Pulsing animation = urgent.</td>
            </tr>
            <tr>
              <td><span className="tag-sla-breach">SLA BREACH</span></td>
              <td>SLA Breach</td>
              <td>First external reply exceeded the SLA threshold (4h general, 2h FHPS).</td>
            </tr>
            <tr>
              <td><span className="tag-sla-ok">1.2h</span></td>
              <td>SLA Met</td>
              <td>First external reply was sent within the SLA threshold.</td>
            </tr>
            <tr>
              <td><span className="tag-penalty">$200</span></td>
              <td>FHPS Penalty</td>
              <td>Contractual penalty for FHPS SLA breach. $200 per breached ticket.</td>
            </tr>
            <tr>
              <td><span className="tag-high-comments">💬 8</span></td>
              <td>High Comments</td>
              <td>Ticket has more than 6 comments — indicates back-and-forth or complexity.</td>
            </tr>
            <tr>
              <td><span className="tag-stagnant">STAGNANT</span></td>
              <td>Stagnant</td>
              <td>No update for 24+ hours. May be stuck or forgotten.</td>
            </tr>
            <tr>
              <td><span style={{fontSize: 10, color: 'var(--accent-purple)'}}>⏳</span></td>
              <td>Waiting</td>
              <td>Last comment was internal — waiting for partner/customer response.</td>
            </tr>
            <tr>
              <td><span style={{fontSize: 10, color: 'var(--accent-orange)'}}>⏳ awaiting</span></td>
              <td>Awaiting 1st Reply</td>
              <td>No external reply has been sent yet, but SLA hasn't been breached yet.</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div className="section-divider" />

      {/* ── Sorting Guide ── */}
      <div className="section-header" style={{fontSize: 15}}>🔀 Sorting & Filtering</div>
      <div className="def-grid">
        <div className="def-card">
          <div className="def-card-title">📊 Sortable Columns</div>
          <p>Click any column header to sort. Click again to reverse direction (↑ asc / ↓ desc).</p>
          <ul>
            <li><strong>Priority:</strong> Highest → Lowest (ties broken by created date)</li>
            <li><strong>Key:</strong> Alphabetical by Jira key</li>
            <li><strong>Project:</strong> Alphabetical by project code</li>
            <li><strong>Status:</strong> Alphabetical by status name</li>
            <li><strong>Assignee:</strong> Alphabetical by name</li>
            <li><strong>Created:</strong> Oldest first (asc) or newest first (desc)</li>
            <li><strong>Total Age:</strong> Longest-lived tickets first</li>
            <li><strong>Last Update:</strong> Most stagnant first</li>
            <li><strong>Comments:</strong> Most comments first</li>
            <li><strong>SLA:</strong> Breaches first, then by reply time</li>
          </ul>
        </div>
        <div className="def-card">
          <div className="def-card-title">🔍 Filter Options</div>
          <p>Use the filter bar to narrow the queue:</p>
          <ul>
            <li><strong>Project buttons:</strong> PSS, MCQM, FHPS, OAC, or All</li>
            <li><strong>Whoop toggle:</strong> Show only Whoop-tagged tickets</li>
            <li><strong>Assignee dropdown:</strong> Filter to a single team member</li>
            <li><strong>Status dropdown:</strong> Filter by Jira status, or special filters:</li>
            <li style={{marginLeft: 16}}>⚠ Reopened — any ticket with reopen count &gt; 0</li>
            <li style={{marginLeft: 16}}>⏰ Stagnant — no update for 24+ hours</li>
            <li style={{marginLeft: 16}}>⏳ Waiting — last comment was internal</li>
            <li style={{marginLeft: 16}}>🚨 SLA Breach — first reply exceeded threshold</li>
            <li style={{marginLeft: 16}}>💬 6+ Comments — high comment volume</li>
            <li style={{marginLeft: 16}}>🔥 Chronic Reopen — 4+ reopens in 72h</li>
            <li><strong>Search box:</strong> Free-text search across key, summary, and assignee</li>
          </ul>
        </div>
      </div>

      <div className="section-divider" />

      {/* ── Data Sources ── */}
      <div className="section-header" style={{fontSize: 15}}>🔌 Data Sources & Refresh</div>
      <div className="def-card" style={{marginBottom: 24}}>
        <p>
          All data is fetched live from <strong>Jira Cloud</strong> via a Netlify serverless
          function (<code>jira-proxy</code>). The function queries four projects
          (PSS, MCQM, FHPS, OAC) and returns all open tickets with full changelog history.
        </p>
        <ul>
          <li><strong>Auto-refresh:</strong> every 60 seconds</li>
          <li><strong>Manual refresh:</strong> click "Refresh" in the header</li>
          <li><strong>Changelog:</strong> includes all status transitions, comment metadata, and assignee changes</li>
          <li><strong>Demo mode:</strong> if the Jira API is unavailable, the app falls back to synthetic demo data</li>
        </ul>
      </div>
    </div>
  );
}

// ── Login Page ───────────────────────────────────────────────
function LoginPage({ onAuth }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [fullName, setFullName] = useState('');
  const [mode, setMode] = useState('login');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const handleLogin = async (e) => {
    e.preventDefault();
    setLoading(true);
    setError('');
    const { data, error: err } = await supabaseClient.auth.signInWithPassword({ email, password });
    if (err) { setError(err.message); setLoading(false); return; }
    onAuth(data.user);
  };

  const handleSignup = async (e) => {
    e.preventDefault();
    if (!fullName.trim()) { setError('Full name is required'); return; }
    setLoading(true);
    setError('');
    const { data, error: err } = await supabaseClient.auth.signUp({
      email,
      password,
      options: { data: { full_name: fullName.trim() } }
    });
    if (err) { setError(err.message); setLoading(false); return; }
    if (data.user && !data.session) {
      setError('Check your email to confirm your account, then sign in.');
      setMode('login');
      setLoading(false);
      return;
    }
    onAuth(data.user);
  };

  return (
    <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--bg-primary)' }}>
      <div style={{ background: '#fff', borderRadius: 12, padding: '40px 32px', maxWidth: 400, width: '100%', boxShadow: '0 4px 24px rgba(0,0,0,0.08)' }}>
        <div style={{ textAlign: 'center', marginBottom: 24 }}>
          <h1 style={{ color: 'var(--text-primary)', fontSize: 22, margin: '0 0 4px', fontFamily: 'var(--font-mono)' }}>CX WORKBENCH</h1>
          <p style={{ color: 'var(--text-muted)', fontSize: 13, margin: 0 }}>{mode === 'login' ? 'Sign in to continue' : 'Create your account'}</p>
        </div>
        <form onSubmit={mode === 'login' ? handleLogin : handleSignup}>
          {mode === 'signup' && (
            <div style={{ marginBottom: 12 }}>
              <label style={{ display: 'block', fontSize: 12, fontWeight: 600, color: 'var(--text-secondary)', marginBottom: 4 }}>Full Name</label>
              <input type="text" value={fullName} onChange={e => setFullName(e.target.value)}
                placeholder="Jane Smith"
                style={{ width: '100%', padding: '10px 12px', border: '1px solid var(--border)', borderRadius: 6, fontSize: 14, boxSizing: 'border-box' }} />
            </div>
          )}
          <div style={{ marginBottom: 12 }}>
            <label style={{ display: 'block', fontSize: 12, fontWeight: 600, color: 'var(--text-secondary)', marginBottom: 4 }}>Email</label>
            <input type="email" value={email} onChange={e => setEmail(e.target.value)} required
              placeholder="you@steadymd.com"
              style={{ width: '100%', padding: '10px 12px', border: '1px solid var(--border)', borderRadius: 6, fontSize: 14, boxSizing: 'border-box' }} />
          </div>
          <div style={{ marginBottom: 16 }}>
            <label style={{ display: 'block', fontSize: 12, fontWeight: 600, color: 'var(--text-secondary)', marginBottom: 4 }}>Password</label>
            <input type="password" value={password} onChange={e => setPassword(e.target.value)} required
              placeholder={mode === 'signup' ? 'Min 6 characters' : '••••••••'}
              style={{ width: '100%', padding: '10px 12px', border: '1px solid var(--border)', borderRadius: 6, fontSize: 14, boxSizing: 'border-box' }} />
          </div>
          {error && <div style={{ background: 'var(--accent-red-soft)', color: 'var(--accent-red)', padding: '8px 12px', borderRadius: 6, fontSize: 12, marginBottom: 12 }}>{error}</div>}
          <button type="submit" disabled={loading}
            style={{ width: '100%', padding: '10px', fontSize: 14, background: 'var(--accent-blue)', color: '#fff', border: 'none', borderRadius: 6, fontWeight: 600, cursor: 'pointer' }}>
            {loading ? '...' : mode === 'login' ? 'Sign In' : 'Create Account'}
          </button>
        </form>
        <div style={{ textAlign: 'center', marginTop: 16, fontSize: 13, color: 'var(--text-muted)' }}>
          {mode === 'login' ? (
            <span>No account? <button onClick={() => { setMode('signup'); setError(''); }} style={{ background: 'none', border: 'none', color: 'var(--accent-blue)', cursor: 'pointer', fontWeight: 600, fontSize: 13 }}>Sign up</button></span>
          ) : (
            <span>Already have an account? <button onClick={() => { setMode('login'); setError(''); }} style={{ background: 'none', border: 'none', color: 'var(--accent-blue)', cursor: 'pointer', fontWeight: 600, fontSize: 13 }}>Sign in</button></span>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Auth Provider ────────────────────────────────────────────
function AuthProvider() {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    supabaseClient.auth.getSession().then(({ data: { session } }) => {
      if (session?.user) setUser(session.user);
      setLoading(false);
    });
    const { data: { subscription } } = supabaseClient.auth.onAuthStateChange((event, session) => {
      if (session?.user) setUser(session.user);
      else setUser(null);
    });
    return () => subscription.unsubscribe();
  }, []);

  const signOut = async () => {
    await supabaseClient.auth.signOut();
    setUser(null);
  };

  if (loading) {
    return (
      <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--bg-primary)' }}>
        <div className="loading-spinner" />
      </div>
    );
  }

  if (!user) {
    return <LoginPage onAuth={setUser} />;
  }

  return (
    <AuthContext.Provider value={{ user, signOut }}>
      <App />
    </AuthContext.Provider>
  );
}

// ── Mount ────────────────────────────────────────────────────
ReactDOM.render(<AuthProvider />, document.getElementById('root'));
</script>
</body>
